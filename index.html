<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Frequency Manual Link Builder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h2>Manual Link Builder</h2>
    <div id="container">
      <form>
        <label>
          URL:
          <input type="text" id="url" name="url" required />
        </label>
        <label>
          Lead Image URL:
          <input type="text" id="imgUrl" name="imgUrl" required />
        </label>
        <label>
          Headline:
          <input type="text" id="headline" name="headline" required />
        </label>
        <label>
          Author(s):
          <input type="text" id="author" name="author" />
        </label>
        <label for="description"> Description:</label>
        <textarea
          id="description"
          name="description"
          required
          rows="5"
        ></textarea>

        <label>
          Call to action:
          <input type="text" id="cta" name="cta" placeholder="READ NOW" />
        </label>
        <button type="button" id="submit-button">COPY EMBED CODE</button>
        <span class="helper-text"></span>
      </form>
      <div id="embed-code">
        <p>
          <a class="link" href="" target="_blank" tabindex="-1">
            <img
              src="https://npr.brightspotcdn.com/dims4/default/3006667/2147483647/strip/true/crop/3299x962+0+0/resize/534x156!/format/webp/quality/90/?url=http%3A%2F%2Fnpr-brightspot.s3.amazonaws.com%2F22%2F57%2Fa6ec466148258ff7098d163fe4a5%2Fvermontpublic-horizontallogo-fullcolor-lighttype-grove.png"
              alt=""
              width="100%"
              height="auto"
              class="heroImage"
          /></a>
        </p>
        <h3>
          <a
            class="link headlineLink"
            href=""
            target="_blank"
            tabindex="-1"
            style="text-decoration: none !important; font-weight: bold"
            >Headline</a
          >
        </h3>
        <h4 class="authorText"><em>Author(s)</em></h4>
        <p class="descriptionText" style="margin: 0px">Description</p>
        <p style="text-align: center">
          <a
            class="link"
            href=""
            target="_blank"
            tabindex="-1"
            style="
              text-align: center;
              background-color: #00807f;
              border-radius: 4px;
              color: #fff;
              display: inline-block;
              font-family: sans-serif;
              font-size: 16px;
              font-weight: bold;
              line-height: 55px;
              width: 155px;
              -webkit-text-size-adjust: none;
              text-decoration: none !important;
            "
            ><strong
              ><span style="color: rgb(255, 255, 255)"
                ><span style="font-size: 16px"
                  ><span style="font-family: sans-serif"
                    ><span
                      class="ctaText"
                      style="background-color: rgb(0, 128, 127)"
                      >READ NOW</span
                    ></span
                  ></span
                ></span
              ></strong
            ></a
          >
        </p>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
